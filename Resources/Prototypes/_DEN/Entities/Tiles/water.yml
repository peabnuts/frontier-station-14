- type: entity
  parent: FloorWaterEntity
  id: FloorWaterEntityPool
  name: pool water
  description: You do NOT want to drink this.
  components:
  - type: Sprite
    sprite: _DEN/Tiles/Planet/water.rsi
    layers:
    - state: pool_water
  # MyFork: Removed fishing info for my fork (rename later)
  - type: SolutionContainerManager
    solutions:
      pool:
        maxVol: 10000
        reagents:
        - ReagentId: Water
          Quantity: 9900
        - ReagentId: Chlorine
          Quantity: 100 # about 1/100 chlorine
  # chlorinated pool water is actually supposed to be 1-5 ppm of chlorine but solution
  # transfers and metabolism in ss14 round to the nearest 0.01 and the idea of poisoning
  # yourself by drinking pool water is fucking hysterical.
  # for the record, a full human stomach of this stuff is 2 toxin damage. its not much
  - type: SolutionRegeneration
    solution: pool
    generated:
      reagents:
      - ReagentId: Water
        Quantity: 99
      - ReagentId: Chlorine
        Quantity: 1
  - type: Drink
    solution: pool
    transferAmount: 1

# Waterfalls

- type: entity
  id: FloorWaterfallBase
  abstract: true
  components:
  - type: AmbientSound
    volume: 4
    range: 6
    sound:
      path: /Audio/_DEN/Effects/Fluids/waterfall.ogg

- type: entity
  parent: [FloorWaterEntity, FloorWaterfallBase]
  id: FloorWaterfallEntity
  name: waterfall
  suffix: non-occluded
  description: Secrets lie behind.. Or not. Find out.
  components:
  - type: Sprite
    sprite: _DEN/Tiles/Planet/waterfall.rsi
    layers:
    - state: regular-water
    drawdepth: Overdoors

- type: entity
  parent: FloorWaterfallEntity
  id: FloorWaterfallEntityOccluded
  suffix: occluded
  components:
  - type: Occluder

- type: entity
  parent: [FloorWaterEntityPool, FloorWaterfallBase]
  id: FloorWaterfallEntityPool
  name: waterfall
  suffix: pool, non-occluded
  description: Usually pools don't have waterfalls. This one is unique.
  components:
  - type: Sprite
    sprite: _DEN/Tiles/Planet/waterfall.rsi
    layers:
    - state: pool-water
    drawdepth: Overdoors

- type: entity
  parent: FloorWaterfallEntityPool
  id: FloorPoolWaterfallEntityOccluded
  suffix: pool, occluded
  components:
  - type: Sprite
    layers:
    - state: pool-water
